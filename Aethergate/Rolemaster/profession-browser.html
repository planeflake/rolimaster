<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aethergate Rolemaster Profession Browser</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10151a;
      --panel: #172027;
      --panel-soft: #202c34;
      --line: #34444d;
      --text: #ecf2ef;
      --muted: #aab8b6;
      --gold: #e0b869;
      --teal: #70c8bf;
      --rose: #dc8e91;
      --shadow: 0 16px 40px rgb(0 0 0 / 22%);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top right, #23323a 0, var(--bg) 42rem);
      color: var(--text);
      font: 15px/1.5 system-ui, sans-serif;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    a { color: var(--teal); }
    .layout {
      display: grid;
      grid-template-columns: minmax(250px, 320px) minmax(0, 1fr);
      min-height: 100vh;
    }
    aside {
      padding: 22px;
      background: rgb(14 20 24 / 86%);
      border-right: 1px solid var(--line);
    }
    main { padding: 28px; }
    h1, h2, h3 { margin: 0; font-family: Georgia, serif; }
    h1 { color: var(--gold); font-size: 24px; }
    h2 { font-size: 30px; }
    h3 { margin-top: 24px; color: var(--gold); font-size: 20px; }
    .eyebrow {
      margin: 0 0 5px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .intro, .muted { color: var(--muted); }
    .intro { margin: 8px 0 18px; }
    .control {
      width: 100%;
      margin: 6px 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
    }
    .profession-list {
      display: grid;
      gap: 6px;
      margin-top: 14px;
    }
    .profession {
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      text-align: left;
    }
    .profession:hover, .profession.active {
      border-color: var(--gold);
      background: var(--panel);
    }
    .profession small { display: block; margin-top: 2px; color: var(--muted); }
    .card {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgb(23 32 39 / 92%);
      box-shadow: var(--shadow);
    }
    .topline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .note-link {
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
    }
    .pill-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--text);
      text-decoration: none;
    }
    .pill.imported::before { content: "â—"; color: var(--teal); font-size: 10px; }
    .pill.pending::before { content: "â—‹"; color: var(--rose); font-size: 12px; }
    .pill.package::before { content: "â—†"; color: var(--gold); font-size: 10px; }
    .spell-viewer { margin-top: 16px; }
    .spell-table { width: 100%; border-collapse: collapse; }
    .spell-table th, .spell-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    .spell-table th { color: var(--gold); }
    .spell-table td:first-child { width: 68px; color: var(--teal); }
    button.pill { font: inherit; }
    button.pill:hover, button.pill.active { border-color: var(--gold); }
    .scenario-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 9px;
      margin-top: 10px;
    }
    .scenario {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }
    .scenario strong { display: block; color: var(--gold); }
    .empty {
      padding: 12px;
      border-left: 3px solid var(--gold);
      color: var(--muted);
    }
    @media (max-width: 780px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      main { padding: 18px; }
    }
  </style>
</head>

  </div>

      "Nature's Way","Necromancy","Nerve and Organ Mastery","Nerve Law","Organ Law","Organ Ways","Organic Skills","Past Visions",
      "Path Mastery","Physical Enhancement","Physical Erosion","Plant Mastery","Poison Mastery","Presence","Protections","Prosthetics",
      "Purifications","Rapid Ways","Repulsions","Rune Mastery","Self Healing","Sense Control","Sense Mastery","Sense Through Others","Senses",
      "Shifting","Shield Mastery","Solid Alteration","Solid Destruction","Solid Manipulation","Soul Destruction","Sound Control","Sound Lore",
      "Sound Molding","Sound Projection","Sound's Way","Speed","Spell Defense","Spell Enhancement","Spell Reins","Spell Resistance",
      "Spell Wall","Spirit Mastery","Starlights","Starlore","Starsense","Summons","Surface Ways","Symbolic Ways","Telekinesis","Thieving Law",
      "Time's Bridge","True Perception","True Sight","Unbarring Ways","Vision Borrowing","Vision Guard","Warrior Law","Water Law","Way of the Voice",
      "Weapon Mastery","Weather Ways","Wind Law"
    ]);

    const $ = (id) => document.getElementById(id);
    let selected = "Magent";
    let selectedSpellList = "";
    const notePath = (folder, name) => `${folder}/${encodeURIComponent(name)}.md`;

    function renderProfessions() {
      const query = $("profession-search").value.toLowerCase();
      const realm = $("realm-filter").value;
      const filtered = professions.filter((p) =>
        p.name.toLowerCase().includes(query) &&
        (!realm || p.realm === realm || p.secondary.includes(realm))
      );
      $("profession-list").innerHTML = filtered.map((p) => `
        <button class="profession ${p.name === selected ? "active" : ""}" data-profession="${p.name}">
          ${p.name}<small>${[p.realm, ...p.secondary].join(" / ")}</small>
        </button>`).join("");
      document.querySelectorAll("[data-profession]").forEach((button) => {
        button.addEventListener("click", () => {
          selected = button.dataset.profession;
          selectedSpellList = "";
          renderProfessions();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const p = professions.find((item) => item.name === selected) || professions[0];
      const playstyle = playstyles[p.name];
      const realms = [p.realm, ...p.secondary].join(" / ");
      const spells = p.spells.length
        ? p.spells.map((spell) => `<button class="pill ${spellProgressions[spell] ? "imported" : "pending"} ${spell === selectedSpellList ? "active" : ""}" data-spell-list="${spell}">${spell}</button>`).join("")
        : `<p class="empty">No fixed spell-list attachment is recorded for this profession.</p>`;
      const suggestions = p.packages.length
        ? p.packages.map((name) => `<a class="pill package" href="${notePath("./04 Training Packages", name)}">${name}</a>`).join("")
        : `<p class="empty">No specific package recommendations are recorded yet. Browse the full catalog below.</p>`;
      $("profession-detail").innerHTML = `
        <div class="topline">
          <div><p class="eyebrow">${realms}</p><h2>${p.name}</h2></div>
          <a class="note-link" href="${notePath("./02 Professions", p.name)}">Open Markdown note</a>
        </div>
        <p>${p.summary}</p>
        <h3>Typical Abilities</h3>
        <p>${playstyle[0]}</p>
        <h3>Situation Examples</h3>
        <div class="scenario-grid">${playstyle[1].map(([title, text]) => `<div class="scenario"><strong>${title}</strong>${text}</div>`).join("")}</div>
        <h3>Spell Lists</h3>
        <p class="muted"><span class="pill imported">Spell progression available</span> <span class="pill pending">List details pending</span></p>
        <div class="pill-grid">${spells}</div>
        <div id="spell-viewer" class="spell-viewer"></div>
        <h3>Suggested Training Packages</h3>
        <div class="pill-grid">${suggestions}</div>`;
      document.querySelectorAll("[data-spell-list]").forEach((button) => {
        button.addEventListener("click", () => {
          selectedSpellList = button.dataset.spellList;
          renderDetail();
          renderSpellList();
        });
      });
      renderSpellList();
    }

    function renderSpellList() {
      const viewer = $("spell-viewer");
      if (!selectedSpellList) {
        viewer.innerHTML = `<p class="empty">Click a spell list to view its spells.</p>`;
        return;
      }
      const rows = spellProgressions[selectedSpellList];
      if (!rows) {
        viewer.innerHTML = `<p class="empty"><strong>${selectedSpellList}</strong> is attached to this profession, but its spell progression has not been imported yet.</p>`;
        return;
      }
      viewer.innerHTML = `<h3>${selectedSpellList}</h3>
        <table class="spell-table">
          <thead><tr><th>Level</th><th>Spell</th><th>Notes</th></tr></thead>
          <tbody>${rows.map(([level, spell, notes]) => `<tr><td>${level}</td><td>${spell}</td><td>${notes}</td></tr>`).join("")}</tbody>
        </table>`;
    }

    ["profession-search", "realm-filter"].forEach((id) => $(id).addEventListener("input", renderProfessions));
    renderProfessions();
    renderDetail();
  </script>
</body>
</html>
